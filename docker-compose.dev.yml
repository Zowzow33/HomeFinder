version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: homefinder
      POSTGRES_USER: homefinder_user
      POSTGRES_PASSWORD: homefinder_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homefinder_user -d homefinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql://homefinder_user:homefinder_password@postgres:5432/homefinder"
      JWT_SECRET: "your-super-secure-jwt-secret-key-here"
      JWT_EXPIRES_IN: "7d"
      PORT: 5000
      FRONTEND_URL: "http://localhost:3000"
      BCRYPT_ROUNDS: 12
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data: