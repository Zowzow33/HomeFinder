version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: homefinder-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: homefinder
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - homefinder-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: homefinder-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/homefinder
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=24h
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - homefinder-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: homefinder-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - homefinder-network

volumes:
  mongodb_data:

networks:
  homefinder-network:
    driver: bridge